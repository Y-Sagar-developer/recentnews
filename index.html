<!DOCTYPE html>
<html>

<head>
    <title>Recent News</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f2f2f2;
        }


        .section {
            width: 90%;
            margin: 60px auto;
            display: flex;
            gap: 40px;
            margin-top: 180px
            
        }


        .left {
            width: 25%;
        }

        .left h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .left a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
        }


        .cards {
            width: 75%;
            display: flex;
            gap: 30px;
        }

        .card {
            background: white;
            width: 300px;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            font-size: 12px;
            color: gray;
            margin: 15px 0 5px 0;
        }

        .card h3 {
            font-size: 20px;
            margin: 0 0 20px 0;
        }
    </style>

</head>

<body>

    <div class="section">

        <div class="left">
            <h2>Recent news<br>and events</h2>
            <a href="#">VIEW MORE →</a>
        </div>


        <div class="cards">

            <div class="card">
                <img src="./c1.jpeg">
                <p>INTERVIEW</p>
                <h3>Always applying higher standards</h3>
            </div>

            <div class="card">
                <img src="./c2.jpeg">
                <p>INTERVIEW</p>
                <h3>Ecological materials and performances</h3>
            </div>

            <div class="card">
                <img src="./c3.jpeg">
                <p>INTERVIEW</p>
                <h3>Cultural artifacts and new attitudes</h3>
            </div>

        </div>

    </div>

</body>

</html>
